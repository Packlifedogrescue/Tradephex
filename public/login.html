<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradephex — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:#060606; --surface:#0E0E0E; --surface2:#151515;
  --gold:#C9A84C; --gold-bright:#F0CF7A; --gold-dim:#6B5520;
  --white:#F5F5F5; --gray:#BBBBBB; --gray2:#888888; --gray3:#444444;
  --border:rgba(201,168,76,0.15); --border2:rgba(201,168,76,0.3);
  --green:#00E676; --red:#FF1744;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* GRID BG */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 20%,transparent 80%);}

/* NAV */
nav{padding:0 60px;height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(6,6,6,0.9);position:relative;z-index:1;}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:0.1em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-right{font-size:13px;color:var(--gray2);}
.nav-right a{color:var(--gold);text-decoration:none;font-weight:500;}
.nav-right a:hover{color:var(--gold-bright);}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;z-index:1;}

/* CARD */
.auth-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border2);padding:48px;}
.auth-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.auth-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:36px;letter-spacing:0.04em;text-transform:uppercase;color:var(--white);margin-bottom:8px;}
.auth-sub{font-size:14px;color:var(--gray2);margin-bottom:36px;font-weight:300;}

/* FORM */
.form-group{margin-bottom:20px;}
.form-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray2);display:block;margin-bottom:8px;}
.form-input{width:100%;background:var(--black);border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:14px;padding:12px 16px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--gray3);}
.form-input.error{border-color:var(--red);}

.btn-submit{width:100%;background:var(--gold);color:var(--black);border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.15em;text-transform:uppercase;padding:14px;cursor:pointer;transition:background 0.2s;margin-top:8px;}
.btn-submit:hover{background:var(--gold-bright);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:16px;margin:24px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray3);letter-spacing:0.1em;}

.error-msg{background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.2);color:var(--red);font-family:'DM Mono',monospace;font-size:11px;padding:10px 14px;margin-bottom:20px;display:none;}
.error-msg.show{display:block;}

.success-msg{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:var(--green);font-family:'DM Mono',monospace;font-size:11px;padding:10px 14px;margin-bottom:20px;display:none;}
.success-msg.show{display:block;}

.forgot-link{display:block;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--gray2);text-decoration:none;margin-top:6px;transition:color 0.2s;}
.forgot-link:hover{color:var(--gold);}

.signup-prompt{text-align:center;margin-top:28px;font-size:13px;color:var(--gray2);}
.signup-prompt a{color:var(--gold);text-decoration:none;font-weight:500;}
.signup-prompt a:hover{color:var(--gold-bright);}

/* FOOTER */
footer{padding:24px 60px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:0.1em;color:var(--white);}
.footer-logo span{color:var(--gold);}
.footer-copy{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray3);}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">TRADE<span>PHEX</span></a>
  <div class="nav-right">Don't have an account? <a href="/signup">Sign up free</a></div>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-eyebrow">Welcome back</div>
    <h1 class="auth-title">Log In</h1>
    <p class="auth-sub">Access your trade journal and dashboard.</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
      <a href="/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In</button>

    <div class="signup-prompt">
      New to Tradephex? <a href="/signup">Create free account</a>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">TRADE<span>PHEX</span></div>
  <div class="footer-copy">© 2026 Tradephex. Execute. Analyze. Elevate.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://esgfvgpdjxalhaofmwwt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ2Z2Z3BkanhhbGhhb2Ztd3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc0OTMsImV4cCI6MjA5MjQ2MzQ5M30.cTz_WCY9tTDQAw5yRq1XSjnvEueIypjdvOD2X9Bz1SA';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Get redirect target from URL (defaults to /journal)
function getRedirectTarget() {
  const params = new URLSearchParams(window.location.search);
  const target = params.get('redirect');
  // Only allow same-origin redirects (security: prevent open redirect attacks)
  if (target && target.startsWith('/') && !target.startsWith('//')) {
    return target;
  }
  return '/journal';
}

// Check if already logged in
async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) window.location.href = getRedirectTarget();
}
checkSession();

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    showError(error.message || 'Login failed. Please check your credentials.');
    btn.disabled = false;
    btn.textContent = 'Log In';
    return;
  }

  showSuccess('Login successful! Redirecting...');
  setTimeout(() => window.location.href = getRedirectTarget(), 800);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
