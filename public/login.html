<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Tradephex</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@200;300;400;500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#000;--soft:#0A0A0A;--line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.12);--gold:#C9A84C;--gold-soft:#9F8638;--text:#E8E8E8;--mute:#6F6F6F;--mute2:#3F3F3F;--red:#D85B5B;--serif:'Spectral',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',Menlo,monospace;}
body{background:var(--black);color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;cursor:none;-webkit-font-smoothing:antialiased;}
::selection{background:var(--gold);color:#000;}
a{color:inherit;text-decoration:none;cursor:none;}button{font-family:inherit;cursor:none;border:none;background:none;color:inherit;}
.cursor{position:fixed;width:6px;height:6px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;transition:transform .15s ease,width .25s ease,height .25s ease,background .2s ease;mix-blend-mode:difference;will-change:transform;top:0;left:0;}
.cursor.hover{width:32px;height:32px;background:transparent;border:1px solid var(--gold);transform:translate(-13px,-13px);}
@media(hover:none){.cursor{display:none;}body,a,button{cursor:auto;}}

nav{padding:24px 64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.brand{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:#FFF;}
.brand span{color:var(--gold);}
.navAlt{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);}
.navAlt a{color:var(--gold);transition:color .25s;margin-left:14px;}
.navAlt a:hover{color:var(--text);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 24px;}
.box{width:100%;max-width:480px;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin-bottom:32px;display:flex;align-items:center;gap:14px;}
.eyebrow::before{content:'';width:32px;height:1px;background:var(--gold);}
h1{font-family:var(--serif);font-weight:300;font-size:clamp(40px,5vw,64px);line-height:.96;letter-spacing:-.025em;color:#FFF;margin-bottom:18px;}
h1 em{font-style:italic;color:var(--gold);font-weight:200;}
.sub{font-family:var(--sans);font-size:15px;color:var(--mute);margin-bottom:48px;}

.field{margin-bottom:24px;}
.label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);margin-bottom:10px;}
.input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);padding:14px 0;font-family:var(--sans);font-size:16px;color:var(--text);outline:none;transition:border-color .3s;cursor:none;}
.input:focus{border-color:var(--gold);}
.input::placeholder{color:var(--mute2);}

.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;}
.checkbox{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.04em;cursor:none;}
.checkbox input{accent-color:var(--gold);}
.forgot{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--gold);transition:color .25s;}
.forgot:hover{color:var(--text);}

.btn{width:100%;padding:18px;font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-soft);transition:.4s;position:relative;overflow:hidden;cursor:none;}
.btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-100%);transition:transform .5s;z-index:0;}
.btn:hover::before{transform:translateX(0);}
.btn span{position:relative;z-index:1;transition:color .3s;}
.btn:hover span{color:#000;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.alt{margin-top:48px;padding-top:32px;border-top:1px solid var(--line);text-align:center;font-family:var(--sans);font-size:14px;color:var(--mute);}
.alt a{color:var(--gold);transition:color .25s;}
.alt a:hover{color:var(--text);}

.err{margin-bottom:24px;padding:14px 18px;border:1px solid rgba(216,91,91,.3);background:rgba(216,91,91,.04);font-family:var(--mono);font-size:12px;color:var(--red);display:none;}
.err.show{display:block;}

footer{padding:32px 64px;border-top:1px solid var(--line);text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute2);}

@media(max-width:680px){nav{padding:18px 24px;}footer{padding:24px;}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<nav>
  <a href="/" class="brand">TRADE<span>PHEX</span></a>
  <div class="navAlt">No account?<a href="/signup" data-hover>Sign Up</a></div>
</nav>

<main>
  <div class="box">
    <div class="eyebrow">Sign In</div>
    <h1>Welcome <em>back.</em></h1>
    <p class="sub">Continue your evaluation, manage your funded account, or open the platform.</p>

    <div class="err" id="err"></div>

    <form id="loginForm" onsubmit="return submitLogin(event)">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email" data-hover>
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input type="password" id="password" class="input" placeholder="••••••••" required autocomplete="current-password" data-hover>
      </div>
      <div class="row">
        <label class="checkbox" data-hover><input type="checkbox" id="remember" checked> Remember me</label>
        <a href="#" class="forgot" onclick="forgotPassword(event)" data-hover>Forgot password</a>
      </div>
      <button type="submit" class="btn" id="submitBtn" data-hover><span>Sign In</span></button>
    </form>

    <div class="alt">Need to start an evaluation? <a href="/evaluations" data-hover>View plans</a></div>
  </div>
</main>

<footer>© 2026 Tradephex LLC · The platform is the edge.</footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = 'https://esgfvgpdjxalhaofmwwt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ2Z2Z3BkanhhbGhhb2Ztd3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc0OTMsImV4cCI6MjA5MjQ2MzQ5M30.cTz_WCY9tTDQAw5yRq1XSjnvEueIypjdvOD2X9Bz1SA';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const cursor=document.getElementById('cursor');let cx=0,cy=0,tx=0,ty=0;
window.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
function tickC(){cx+=(tx-cx)*.18;cy+=(ty-cy)*.18;cursor.style.transform=`translate(${cx-3}px,${cy-3}px)`;requestAnimationFrame(tickC);}tickC();
document.querySelectorAll('[data-hover],a,button,input,label').forEach(el=>{el.addEventListener('mouseenter',()=>cursor.classList.add('hover'));el.addEventListener('mouseleave',()=>cursor.classList.remove('hover'));});

window.submitLogin = async function(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  err.classList.remove('show');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    err.textContent = error.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Sign In';
    return false;
  }
  // Get redirect param
  const redirect = new URLSearchParams(location.search).get('redirect') || '/journal';
  location.href = redirect;
  return false;
}

window.forgotPassword = async function(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    const err = document.getElementById('err');
    err.textContent = 'Enter your email above first, then click Forgot Password.';
    err.classList.add('show');
    return;
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login' });
  const err = document.getElementById('err');
  err.style.color = error ? 'var(--red)' : 'var(--gold)';
  err.style.borderColor = error ? 'rgba(216,91,91,.3)' : 'rgba(201,168,76,.3)';
  err.style.background = error ? 'rgba(216,91,91,.04)' : 'rgba(201,168,76,.04)';
  err.textContent = error ? error.message : 'Password reset email sent. Check your inbox.';
  err.classList.add('show');
}

// If already logged in, redirect
(async () => {
  const { data } = await sb.auth.getSession();
  if (data?.session?.user) {
    const redirect = new URLSearchParams(location.search).get('redirect') || '/journal';
    location.href = redirect;
  }
})();
</script>
</body>
</html>
